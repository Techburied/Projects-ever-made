<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hostinger Query</title>
    <link rel="shortcut icon" type="image/png" href="h.png">
    <link rel="shortcut icon" type="image/png" href="h.png">
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Lobster&family=Pacifico&display=swap" rel="stylesheet" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Edu+VIC+WA+NT+Beginner&display=swap" rel="stylesheet" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Edu+VIC+WA+NT+Beginner&family=Poppins:wght@200&family=Square+Peg&display=swap" rel="stylesheet" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Edu+VIC+WA+NT+Beginner&family=Poppins:wght@300&family=Square+Peg&display=swap" rel="stylesheet" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@100&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="main.css">
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        body{
            font-family: 'poppins'!important;
            background-color:rgb(255, 154, 154)
        }
        .container{
            width: 100%;
            height: 70vh;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        #form{
            display: flex;
            margin-bottom: 2em;
        }
        .mr-bottom{
            margin-bottom: 30px;
        }
        .mr-bot{
            margin-right: 15px;
        }
        .p-name{
            font-family: 'poppins';
            font-size: 20px;
            transition: 1s;
        }
        .name{
            transition: 1s;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width:30vh;
            border: 4px solid rgb(255, 227, 227);
            border-radius: 4px;
        }
        .p-name:hover{
            transform: scale(1.1);
        }
        .name-div{
            padding: 0.5em;
        }
        #in-name{
            border: 1px solid rgb(255, 255, 255);
            padding: 0.5em;
            border-radius:3px;
            transition: .2s;
            outline: none;
        }

        #in-name:focus-within {
            border-bottom: 2px solid rgb(0, 0, 0);
            border-top: 0px;
            border-left: 0px;
            border-right: 0px;
        }
        .submit{
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #sub{
            color: black;
            background-color: transparent;
            border: 2px solid black;
            padding: 12px 10px 12px 10px;
            border-radius:10px;
            font-family: 'poppins';
            transition: 1s;
            font-size: 1.2rem;
            width: 130px;
            height: 60px;
            margin-left: 15px;
        }

        #sub:hover{
            font-size: 1.4rem;
            user-select: none;
            cursor: pointer;
            color: white;
            background-color: rgb(0, 0, 0);
            border-radius: 10px;
            border:2px solid rgb(0, 0, 0);
        }
    </style>
</head>
<body>
    <div class="header">
        <nav class="navi">
            <p class="log">
                <a href="/index.html">
                    <img src="h.png" alt="" id="logo">
                </a>
            </p>
            <button id="lang-btn">English</button>
            <div class="header-right">
                <div class="host">
                    <div class="host-btn">
                        <button id="host-bt">Hosting</button>
                    </div>
                    <div class="host-links">
                        <a href="https://www.hostinger.in/web-hosting"><img
                                src="https://assets.hostinger.com/images/hero/icons/shared-hosting-ico-3b9eae97d4.svg"
                                alt=""> Web Hosting</a><br>
                        <a href="https://www.hostinger.in/cloud-hosting"><img
                                src="https://assets.hostinger.com/images/hero/icons/cloud-hosting-ico-8b3eacbef9.svg"
                                alt=""> Cloud Hosting</a><br>
                        <a href="https://www.hostinger.in/wordpress-hosting"><img
                                src="https://assets.hostinger.com/images/hero/icons/shared-hosting-ico-3b9eae97d4.svg"
                                alt=""> WordPress Hosting</a>
                    </div>
                </div>
                <div class="email">
                    <button type="button" class="btn btn-google"
                        onclick="location.href='https://www.hostinger.in/google-workspace'">
                        <svg version="1.1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48"
                            class="LgbsSe-Bz112c" style="width: 30px; margin-right: 8px">
                            <g>
                                <path fill="#EA4335"
                                    d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z">
                                </path>
                                <path fill="#4285F4"
                                    d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z">
                                </path>
                                <path fill="#FBBC05"
                                    d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z">
                                </path>
                                <path fill="#34A853"
                                    d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z">
                                </path>
                                <path fill="none" d="M0 0h48v48H0z"></path>
                            </g>
                        </svg>Google Workspace Email Hosting
                    </button>
                </div>
                <div class="domain">
                    <button id="dom">Domain</button>
                    <div class="dom-contain">
                        <a href="https://www.hostinger.in/domain-name-search"><img
                                src="https://assets.hostinger.com/images/hero/icons/domain-checker-ico-9f56a54b4a.svg"
                                alt="">Domain Name Search</a><br>
                        <a href="https://www.hostinger.in/whois"><img
                                src="https://assets.hostinger.com/images/hero/icons/whois-ico-05661c09d0.svg"
                                alt="">WHOIS Lookup</a><br>
                        <a href="https://www.hostinger.in/domain-transfer"><img
                                src="https://assets.hostinger.com/images/hero/icons/domain-transfer-ico-2a5c55e300.svg"
                                alt="">Domain Transfer</a>
                    </div>
                </div>
                <button id="login" onclick="window.location.href='signin.html'">Sign In</button>
                <button id="cart" onclick="window.location.href='https://cart.hostinger.com/pay/8651e252-cf1c-43a6-a3b8-b57f278549d9'" style="display:flex;align-items:center;justify-content:center;">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
                        width="24px" height="24px" class="cart-svg" fill="rgb(255, 154, 154)">
                        <path d="M0 0h24v24H0V0z" fill="none"></path>
                        <path
                            d="M15.55 13c.75 0 1.41-.41 1.75-1.03l3.58-6.49c.37-.66-.11-1.48-.87-1.48H5.21l-.94-2H1v2h2l3.6 7.59-1.35 2.44C4.52 15.37 5.48 17 7 17h12v-2H7l1.1-2h7.45zM6.16 6h12.15l-2.76 5H8.53L6.16 6zM7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2zm10 0c-1.1 0-1.99.9-1.99 2s.89 2 1.99 2 2-.9 2-2-.9-2-2-2z">
                        </path>
                    </svg>Cart</button>
            </div>
        </nav>
    </div>
    <h1 style="text-align:center;padding-top: 20vh; color:white;font-size: 35px;">Welcome to Hostinger query services</h1>
    <div class="container">
        <div class="box">
            <form action="" id="form">
                <div class="name mr-bot">
                    <div class="name-div">
                        <p class="p-name">Enter your name</p><br>
                        <input type="text" name="name" id="in-name" class="mr-bottom" placeholder="Enter your name">
                    </div>
                </div>

                <div class="name mr-bot">
                    <div class="name-div">
                        <p class="p-name">Enter your email</p><br>
                        <input type="email" name="email" id="in-name" class="mr-bottom" placeholder="Enter your email">
                    </div>
                </div>

                <div class="name">
                    <div class="name-div">
                        <p class="p-name">Enter your query</p><br>
                        <input type="text" name="text" id="in-name" class="mr-bottom" placeholder="Enter your question or query">
                    </div>
                </div>

            </form>
            <div class="submit">
                <input type="submit" value="Submit" id="sub">
            </div>
        </div>
    </div>
</body>
</html>
