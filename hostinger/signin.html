<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In &bull; Hostinger</title>
    <link rel="shortcut icon" type="image/png" href="h.png">
    <style>
        * {
            margin: 0px;
            padding: 0px;
        }

        #ghost {
            width: 100px;
            margin-bottom: 5px;
        }

        .container-top {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            background-color: rgb(255, 154, 154);
            height: 100vh;
        }

        .cont-top-bottom {
            display: flex;
            margin-top: 10px;
        }

        .container {
            background: #fff;
            border-radius: 6px;
            border: 1px solid #ebebeb;
            width: 310px;
            box-shadow: 0 4px 8px 0 rgb(0 0 0 / 4%);
            padding: 24px;
            display: flex;
            justify-content: center;
            flex-direction: column;
            align-items: center;
            margin-top: -120px
        }

        /* .t1 {
            margin: 4px 10px -4px;
            font-size: 13px;
            font-weight: 700;
            text-align: center;
            color: #656b73;
            font-family: sans-serif;
            line-height: 1.5em;
        } */

        .inputs {
            display: flex;
            flex-direction: column;
            width: 310px;
            height: auto;
            margin-top: 14px;
        }

        .text-area:focus {
            outline: none !important;
            border-bottom: 2px solid rgb(247, 197, 90);
        }

        .text-area {
            width: 300px;
            background: #f7f7f7;
            border-radius: 4px;
            border: 1px solid #f7f7f7;
            box-shadow: 0 0 0 0 rgb(0 0 0 / 0%);
            display: block;
            font-size: 14px;
            font-weight: 500;
            height: 44px;
            padding: 0 0 0 12px;
        }

        input[type="text"] {
            font-weight: 600;
        }

        input[type="password"] {
            font-size: 20px;
        }

        .text-area:hover {
            transition: .2s;
            border: 1px solid rgb(247, 197, 90);
        }

        .text-area:focus-within {
            border-bottom: 2px solid rgb(247, 197, 90);
            border-top: 0px;
            border-left: 0px;
            border-right: 0px;
        }

        .text-area-text {
            color: #656b73;
            font-family: sans-serif;
            font-weight: bolder;
            font-size: 12px;
            margin-top: 8px;
            margin-bottom: 8px;
        }

        .pass {
            margin-top: 14px;
        }

        #forgot {
            color: #656b73;
            text-decoration: none;
            transition: all .1s;
            font-weight: 400;
            border-bottom: 2px solid rgba(0, 0, 0, 0);
            font-family: sans-serif;
            font-size: 12px;
        }

        #forgot:hover {
            border-bottom: 2px solid rgb(247, 197, 90);
        }

        .second-action {
            width: 100%;
            height: 100%;
            text-align: right;

        }

        #log {
            color: rgb(247, 197, 90);
            background-color: transparent;
            border: 2px solid rgb(247, 197, 90);
            padding: 12px 10px 12px 10px;
            border-radius: 10px;
            font-family: 'Josefin Sans', sans-serif;
            transition: 1s;
            font-size: 1rem;
            width: 110px;
            height: 50px;
            margin-left: 15px;
        }

        #log:hover {
            font-size: 1.2rem;
            user-select: none;
            cursor: pointer;
            color: white;
            background-color: rgb(247, 197, 90);
            border-radius: 10px;
            border: 2px solid rgb(247, 197, 90);
        }

        .logbtn {
            margin-top: 20px;
        }

        #signup {
            color: #16191c;
            text-decoration: none;
            transition: all .1s;
            font-weight: 600;
            border-bottom: 2px solid rgba(0, 0, 0, 0);
            font-family: "Helvetica Neue For Number", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Helvetica Neue", Helvetica, Arial, sans-serif;
            font-size: 16px;
        }

        #signup:hover {
            border-bottom: 2px solid rgb(247, 197, 90);
            transition: .2s;
        }

        #new-to-snap {
            color: rgb(75, 75, 75);
            text-decoration: none;
            transition: all .1s;
            font-weight: 600;
            border-bottom: 2px solid rgba(0, 0, 0, 0);
            font-family: "Helvetica Neue For Number", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Helvetica Neue", Helvetica, Arial, sans-serif;
            font-size: 16px;
        }

        .container-bot {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: row;
            width: 100%;
            height: 321px;
        }

        #drop-down {
            width: 100%;
        }

        .a-1 {
            display: flex;
            flex-direction: column;
        }

        #lang {
            margin-top: 30 id="a1" px;
        }

        #a1,
        #a2,
        #a3 {
            margin-bottom: 6px;
        }
    </style>
</head>

<body>
    <div class="container-top">
        <div class="container">
            <img id="ghost" src="h.png" alt="">
            <div class="inputs">
                <div class="username">
                    <p class="text-area-text">Username or Email</p>
                    <input type="text" name="" id="" class="text-area">
                </div>
                <div class="password">
                    <p class="text-area-text pass">Password</p>
                    <input type="password" name="" id="" class="text-area">
                </div>
            </div>
            <div class="second-action">
                <a href="#" id="forgot">Forgot Password</a>
            </div>
            <div class="logbtn">
                <button id="log">Log In</button>
            </div>
        </div>
        <div class="cont-top-bottom">
            <pre>
                <p id="new-to-snap">New To Hostinger? <a id="signup" href="#">Sign up</a></p> 
            </pre>
        </div>
    </div>
</body>

</html>
