<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In &bull; Snapchat</title>
    <style>
        *{
            margin: 0px;
            padding: 0px;
        }
        .ghost { 
            width: 40px;
            margin-bottom: 5px;
        }

        .container-top {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            background-color: rgb(242,242,242);
            height: 686px;
        }

        .cont-top-bottom {
            display: flex;
            margin-top: 10px;
        }

        .container {
            background: #fff;
            border-radius: 6px;
            border: 1px solid #ebebeb;
            width: 310px;
            box-shadow: 0 4px 8px 0 rgb(0 0 0 / 4%);
            padding: 24px;
            display: flex;
            justify-content: center;
            flex-direction: column;
            align-items: center;
            margin-top: -120px
        }

        .login {
            margin-top: 8px;
            margin-bottom: 5px;
            font-family: sans-serif;
            font-weight: 800;
            font-size: 24px;
            line-height: 32px;
        }

        /* .t1 {
            margin: 4px 10px -4px;
            font-size: 13px;
            font-weight: 700;
            text-align: center;
            color: #656b73;
            font-family: sans-serif;
            line-height: 1.5em;
        } */

        .inputs {
            display: flex;
            flex-direction: column;
            width: 310px;
            height: auto;
            margin-top: 14px;
        }

        /* .text-area:focus {
            outline: none !important;
            border-bottom: 2px solid rgb(247, 197, 90);
        } */

        .text-area {
            outline: none;
            width: 300px;
            background: #f7f7f7;
            border-radius: 4px;
            border: 1px solid #f7f7f7;
            box-shadow: 0 0 0 0 rgb(0 0 0 / 0%);
            display: block;
            font-size: 14px;
            font-weight: 500;
            height: 44px;
            padding: 0 0 0 12px;
        }

        input[type="text"] {
            font-weight: 600;
        }

        input[type="password"] {
            font-size: 20px;
        }

        .text-area:hover {
            transition: .2s;
            border: 1px solid rgb(247, 197, 90);
        }

        .text-area:focus-within {
            border-bottom: 2px solid rgb(247, 197, 90);
            border-top: 0px;
            border-left: 0px;
            border-right: 0px;
        }

        .text-area-text {
            color: #656b73;
            font-family: sans-serif;
            font-weight: bolder;
            font-size: 12px;
            margin-top: 8px;
            margin-bottom: 8px;
        }

        .pass {
            margin-top: 14px;
        }

        #forgot {
            color: #656b73;
            text-decoration: none;
            transition: all .1s;
            font-weight: 400;
            border-bottom: 2px solid rgba(0, 0, 0, 0);
            font-family: sans-serif;
            font-size: 12px;
        }

        #forgot:hover {
            border-bottom: 2px solid rgb(247, 197, 90);
        }

        .second-action {
            width: 100%;
            height: 100%;
            text-align: right;

        }

        #log {
            border: 1px solid #fffc00;
            background-color: #fffc00;
            color: #16191c;
            font-weight: 600;
            padding: .8em 2em .8em 2em;
            border-radius: 45px;

        }

        #log:hover {
            cursor: pointer;
            background-color: rgb(252, 252, 17);

        }

        .logbtn {
            margin-top: 20px;
        }

        #signup {
            color: #16191c;
            text-decoration: none;
            transition: all .1s;
            font-weight: 600;
            border-bottom: 2px solid rgba(0, 0, 0, 0);
            font-family: "Helvetica Neue For Number", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Helvetica Neue", Helvetica, Arial, sans-serif;
            font-size: 16px;
        }
        #signup:hover {
            border-bottom: 2px solid rgb(247, 197, 90);
            transition:.2s;
        }
        #new-to-snap {
            color: rgb(75, 75, 75);
            text-decoration: none;
            transition: all .1s;
            font-weight: 600;
            border-bottom: 2px solid rgba(0, 0, 0, 0);
            font-family: "Helvetica Neue For Number", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Helvetica Neue", Helvetica, Arial, sans-serif;
            font-size: 16px;
        }
        .container-bot{
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: row;
            width:100%;
            height: 321px;
        }
        #drop-down{
            width: 100%;
        }
        .a-1{
            display: flex;
            flex-direction: column;
        }
        #lang{
            margin-top: 30 id="a1"px;
        }
        #a1,#a2,#a3{
            margin-bottom: 6px;
        }
    </style>
</head>

<body>
    <div class="container-top">
        <div class="container">
            <img class="ghost" src="https://accounts.snapchat.com/accounts/static/images/ghost/snapchat-app-icon.svg"
                alt="">
            <p class="login">Log In</p>
            <!-- <p class="t1">to continue to Create Your Own</p>
            <p class="t1">For best results, please visit Create Your Own from your computer.</p> -->
            <div class="inputs">
                <div class="username">
                    <p class="text-area-text">Username or Email</p>
                    <input type="text" name="" id="" class="text-area">
                </div>
                <div class="password">
                    <p class="text-area-text pass">Password</p>
                    <input type="password" name="" id="" class="text-area">
                </div>
            </div>
            <div class="second-action">
                <a href="https://accounts.snapchat.com/accounts/password_reset_options" id="forgot">Forgot Password</a>
            </div>
            <div class="logbtn">
                <button id="log">Log In</button>
            </div>
        </div>
        <div class="cont-top-bottom">
            <pre>
                <p id="new-to-snap">New To Snapchat? <a id="signup" href="https://www.snapchat.com/download">Sign up</a></p> 
            </pre>
        </div>
    </div>
    <div class="container-bot">
        <div class="d1">
            <h5>Company</h5>
            <div class="a-1">
                <a id="a1" href="https://snap.com/en-US">Snap Inc.</a>
                <a id="a2" href="https://careers.snap.com/">Careers</a>
                <a id="a3" href="https://newsroom.snap.com/">News</a>
            </div>
            <h5 id="lang">Language</h5>
            <select name="" id="drop-down">
                <option value="">English (US)</option>
            </select>
        </div>
        <div class="d2"></div>
        <div class="d3"></div>
        <div class="d4"></div>
    </div>
</body>

</html>
