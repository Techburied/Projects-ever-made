<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600&display=swap">
    <title>Pomodoro Timer</title>
</head>
<body>
    <div class="container">
        <h1>Pomodoro Timer</h1>
        <div class="timer" id="timer">50:00</div>
        <div class="controls">
            <button id="startButton" onclick="startTimer(); player.playVideo();">Start</button>
            <button id="pauseResumeButton" onclick="startTimer(); player.pauseVideo();">Pause</button>
            <button onclick="resetTimer()">Reset</button>
        </div>
        <div id="youtubePlayer"></div>
    </div>

    <script src="script.js"></script>
    <script src="https://www.youtube.com/iframe_api"></script>
</body>
</html>
